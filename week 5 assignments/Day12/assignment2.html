<!DOCTYPE html>
<html>
<head>
<style>
table {
  width: 70%;
  border-collapse: collapse;
  margin: 20px auto;
  text-align: center;
}
table, th, td {
  border: 2px solid black;
}
th, td {
  padding: 8px;
}
</style>
</head>
<body>

<table>
  <tr>
    <th rowspan="2">Subject</th>
    <th rowspan="2"></th>
    <th colspan="1">John Doe</th>
    <th colspan="1">Miriam Luther</th>
  </tr>
  
  <tr>
    <th></th>
    <th></th>
  </tr>

  <!-- Biology -->
  <tr>
    <td rowspan="2">Biology</td>
    <td>Practical</td>
    <td>A</td>
    <td>A</td>
  </tr>
  <tr>
    <td>Theory</td>
    <td>A+</td>
    <td>A</td>
  </tr>

  <!-- Chemistry -->
  <tr>
    <td rowspan="2">Chemistry</td>
    <td>Practical</td>
    <td>B</td>
    <td>C</td>
  </tr>
  <tr>
    <td>Theory</td>
    <td>A</td>
    <td>C+</td>
  </tr>

  <!-- Physics -->
  <tr>
    <td rowspan="2">Physics</td>
    <td>Practical</td>
    <td>A</td>
    <td>A</td>
  </tr>
  <tr>
    <td>Theory</td>
    <td>A-</td>
    <td>A-</td>
  </tr>

</table>

</body>
</html>
