<!DOCTYPE html>
<html>
<head>
<style>
table {
  width: 70%;
  border-collapse: collapse;
  margin: 20px auto;
  text-align: center;
}
table, th, td {
  border: 2px solid black;
}
th, td {
  padding: 8px;
}
.title {
  font-weight: bold;
  font-size: 18px;
}
</style>
</head>
<body>

  </tr>

  </tr>

    <td>123</td>
  </tr>
  <tr>
    <td>1 item</td>
    <td>123</td>

    <td>123</td>
  </tr>
  <tr>
    <td>1 item</td>

    <td>123</td>
  </tr>
  <tr>
    <th colspan="2">sub subtitle</th>

  </tr>
</table>

</body>
</html>
