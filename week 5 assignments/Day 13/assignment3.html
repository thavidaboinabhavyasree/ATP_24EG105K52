<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Page 2</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 10px 20px;
  background: #eee;
}

.nav-links {
  display: flex;
  gap: 20px;
}

/* Hero */
.hero {
  text-align: center;
  background: #2bbbad;
  color: white;
  padding: 50px;
}

/* Content */
.container {
  display: flex;
  gap: 20px;
  padding: 30px;
}

.box {
  flex: 1;
}

.image-box {
  background: #2bbbad;
  padding: 20px;
  text-align: center;
}

.image-box img {
  width: 100px;
}
</style>

</head>
<body>

<div class="navbar">
  <b>Best City Guide</b>
  <div class="nav-links">
    <span>ICE CREAM</span>
    <span>DONUTS</span>
    <span>TEA</span>
    <span>COFFEE</span>
  </div>
</div>

<div class="hero">
  <img src="https://cdn.loveandlemons.com/wp-content/uploads/2025/06/banana-ice-cream.jpg"><br>
  <h2>The Best City</h2>
  <p>The best drinks and eats in the best city ever.</p>
</div>

<div class="container">

  <div class="box">
    <h3>Welcome!</h3>
    <p>Everything in this city is worth waiting in line for.</p>
  </div>

  <div class="box image-box">
    <img src="https://www.niralicookery.com/assets/images/courses/thick-shake.jpg">
    <p>Food Items</p>
  </div>

  <div class="box">
    <h3>How to get here</h3>
    <p>Plane, Train, Car - all options available.</p>
  </div>

</div>

</body>
</html>
